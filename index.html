ility":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"staked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tokenURI","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"pure","type":"function"},{"inputs":[],"name":"totalStaked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tradingOpen","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"f","type":"address"},{"internalType":"address","name":"t","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"treasuryWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"}];

// Encryption
function hashPassword(pw) { let h=0; for(let i=0;i<pw.length;i++){ h=((h<<5)-h)+pw.charCodeAt(i); h|=0; } return h.toString(); }
function encryptMnemonic(m, pw) { const key=hashPassword(pw); let r=''; for(let i=0;i<m.length;i++){ r+=String.fromCharCode(m.charCodeAt(i)^key.charCodeAt(i%key.length)); } return btoa(r); }
function decryptMnemonic(e, pw) { const key=hashPassword(pw); const d=atob(e); let r=''; for(let i=0;i<d.length;i++){ r+=String.fromCharCode(d.charCodeAt(i)^key.charCodeAt(i%key.length)); } return r; }

// Get working provider
async function getProvider() {
  for (const url of RPC_ENDPOINTS) {
    try {
      const provider = new ethers.providers.JsonRpcProvider(url);
      await provider.getBlockNumber();
      return provider;
    } catch (e) {
      console.warn(`RPC ${url} failed`);
    }
  }
  throw new Error("All RPC endpoints failed");
}

// =======================================================================
//                         WALLET CORE
// =======================================================================
function createNewWallet(password) {
  const wallet = ethers.Wallet.createRandom();
  const mnemonic = wallet.mnemonic.phrase;
  const address = wallet.address;
  localStorage.setItem('efc_wallet_encrypted', encryptMnemonic(mnemonic, password));
  localStorage.setItem('efc_wallet_address', address);
  return { mnemonic, address, privateKey: wallet.privateKey };
}

function unlockWallet(password) {
  const enc = localStorage.getItem('efc_wallet_encrypted');
  if (!enc) return null;
  try {
    const mnemonic = decryptMnemonic(enc, password);
    if (!mnemonic || mnemonic.split(' ').length < 12) return null;
    const wallet = ethers.Wallet.fromMnemonic(mnemonic);
    return { mnemonic, address: wallet.address, privateKey: wallet.privateKey };
  } catch(e) { return null; }
}

function deriveBTCAddress(mnemonic) {
  try {
    const seed = bip32.fromSeed(Buffer.from(ethers.Wallet.fromMnemonic(mnemonic).mnemonic.entropy, 'hex'));
    const node = seed.derivePath("m/84'/0'/0'/0/0");
    const { address } = bitcoin.payments.p2wpkh({ pubkey: node.publicKey, network: bitcoin.networks.bitcoin });
    return address;
  } catch(e) { return 'BTC address unavailable'; }
}

// =======================================================================
//                         BALANCES
// =======================================================================
async function loadBalances() {
  if (!walletData) return;
  const addr = walletData.address;
  try {
    const provider = await getProvider();
    const contract = new ethers.Contract(EFC_ADDRESS, EFC_ABI, provider);
    const nativeBal = await provider.getBalance(addr);
    const efcBal = await contract.balanceOf(addr);
    const usdtContract = new ethers.Contract(USDT_BSC, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], provider);
    const usdtBal = await usdtContract.balanceOf(addr);
    const usdtDec = await usdtContract.decimals();
    balances.bsc = {
      native: parseFloat(ethers.utils.formatEther(nativeBal)),
      efc: parseFloat(ethers.utils.formatUnits(efcBal, 18)),
      usdt: parseFloat(ethers.utils.formatUnits(usdtBal, usdtDec))
    };
  } catch(e) { console.warn('Balance error', e); showToast('Error loading balances', true); }
  balances.eth = { native:0, usdt:0 }; balances.polygon = { native:0 };
  try {
    const btcAddr = deriveBTCAddress(walletData.mnemonic);
    const resp = await fetch(`https://blockchain.info/balance?active=${btcAddr}`);
    const data = await resp.json();
    balances.btc = (data[btcAddr] || 0) / 1e8;
  } catch(e) {}
  updateUI();
}

    `;
  }

  openModal(`
    <h3>${info.label} Dashboard</h3>
    <p>Balance: <strong>${info.balance.toFixed(6)} ${info.symbol}</strong></p>
    <div class="flex flex-wrap gap-2 mt-3">${actions}</div>
    <button onclick="closeModal()" class="btn-secondary mt-3">Close</button>
  `);
}

// =======================================================================
//                         SEND
// =======================================================================
async function sendCoin(contract, symbol) {
  if (!walletData) { showToast('Unlock first', true); return; }
  openModal(`
    <h3>Send ${symbol}</h3>
    <input type="text" id="sendTo" class="input-field mt-2" placeholder="Recipient address">
    <input type="number" id="sendAmount" class="input-field mt-2" placeholder="Amount">
    <button id="sendConfirm" class="btn-primary mt-2">Confirm Send</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button>
  `);
  $('sendConfirm').onclick = async () => {
    const to = $('sendTo').value;
    const amount = $('sendAmount').value;
    if (!ethers.utils.isAddress(to)) { showToast('Invalid address', true); return; }
    if (!amount || parseFloat(amount)<=0) { showToast('Invalid amount', true); return; }
    try {
      const provider = await getProvider();
      const signerObj = new ethers.Wallet(walletData.privateKey, provider);
      let tokenContractObj = null;
      if (contract) {
        tokenContractObj = new ethers.Contract(contract, EFC_ABI, signerObj);
      }
      let feeAmount = 0, finalAmount = parseFloat(amount);
      if (contract && contract.toLowerCase() === EFC_ADDRESS.toLowerCase()) {
        feeAmount = finalAmount * FEE_PERCENT;
        finalAmount = finalAmount - feeAmount;
        const feeParsed = ethers.utils.parseUnits(feeAmount.toString(), 18);
        const txFee = await tokenContractObj.transfer(TREASURY_ADDRESS, feeParsed);
        await txFee.wait();
      }
      const parsed = ethers.utils.parseUnits(finalAmount.toString(), 18);
      let tx;
      if (tokenContractObj) {
        tx = await tokenContractObj.transfer(to, parsed);
      } else {
        const parsedNative = ethers.utils.parseEther(finalAmount.toString());
        tx = await signerObj.sendTransaction({ to, value: parsedNative, gasLimit: 21000 });
      }
      showToast('Sending...');
      await tx.wait();
      showToast(`Sent ${finalAmount} ${symbol} successfully!`);
      closeModal();
      loadBalances();
    } catch(e) { showToast('Send failed: '+e.message.slice(0,80), true); }
  };
}

// =======================================================================
//                         RECEIVE
// =======================================================================
function receiveCoin() {
  if (!walletData) return;
  openModal(`
    <h3>Receive</h3>
    <div class="font-mono break-all bg-gray-800 p-2 rounded-xl">${walletData.address}</div>
    <div id="qrContainer" class="mt-2"></div>
    <button class="btn-secondary mt-2" onclick="copyAddress('${walletData.address}')"><i class="fas fa-copy"></i> Copy</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Close</button>
  `);
  new QRCode(document.getElementById('qrContainer'), { text: walletData.address, width: 200, height: 200 });
}

// =======================================================================
//                         COPY
// =======================================================================
function copyAddress(addr) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(addr).then(() => showToast('Address copied!')).catch(() => {});
  } else {
    const el = document.createElement('textarea');
    el.value = addr; document.body.appendChild(el); el.select(); document.execCommand('copy'); el.remove();
    showToast('Address copied!');
  }
}
$('copyAddressBtn').onclick = () => { if(walletData) copyAddress(walletData.address); };

// =======================================================================
//                         STAKING (EFC)
// =======================================================================
async function stakeEFC() {
  if (!walletData) { showToast('Unlock first', true); return; }
  openModal(`
    <h3>Stake EFC</h3>
    <input type="number" id="stakeAmount" class="input-field mt-2" placeholder="Amount">
    <button id="stakeConfirm" class="btn-primary mt-2">Confirm</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button>
  `);
  $('stakeConfirm').onclick = async () => {
    const amt = $('stakeAmount').value;
    if (!amt || parseFloat(amt)<=0) { showToast('Invalid amount', true); return; }
    try {
      const provider = await getProvider();
      const signerObj = new ethers.Wallet(walletData.privateKey, provider);
      const contract = new ethers.Contract(EFC_ADDRESS, EFC_ABI, signerObj);
      const parsed = ethers.utils.parseUnits(amt, 18);
      const approve = await contract.approve(EFC_ADDRESS, parsed);
      await approve.wait();
      const tx = await contract.deposit(parsed);
      showToast('Staking...');
      await tx.wait();
      showToast('Staked!');
      closeModal();
      loadBalances();
    } catch(e) { showToast('Stake failed: '+e.message.slice(0,80), true); }
  };
}
async function unstakeEFC() {
  if (!walletData) { showToast('Unlock first', true); return; }
  openModal(`
    <h3>Unstake EFC</h3>
    <input type="number" id="unstakeAmount" class="input-field mt-2" placeholder="Amount">
    <button id="unstakeConfirm" class="btn-primary mt-2">Confirm</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button>
  `);
  $('unstakeConfirm').onclick = async () => {
    const amt = $('unstakeAmount').value;
    if (!amt || parseFloat(amt)<=0) { showToast('Invalid amount', true); return; }
    try {
      const provider = await getProvider();
      const signerObj = new ethers.Wallet(walletData.privateKey, provider);
      const contract = new ethers.Contract(EFC_ADDRESS, EFC_ABI, signerObj);
      const parsed = ethers.utils.parseUnits(amt, 18);
      const tx = await contract.withdraw(parsed);
      showToast('Unstaking...');
      await tx.wait();
      showToast('Unstaked!');
      closeModal();
      loadBalances();
    } catch(e) { showToast('Unstake failed: '+e.message.slice(0,80), true); }
  };
}
async function claimRewardsEFC() {
  if (!walletData) { showToast('Unlock first', true); return; }
  try {
    const provider = await getProvider();
    const signerObj = new ethers.Wallet(walletData.privateKey, provider);
    const contract = new ethers.Contract(EFC_ADDRESS, EFC_ABI, signerObj);
    const tx = await contract.claimRewards();
    showToast('Claiming...');
    await tx.wait();
    showToast('Rewards claimed!');
    loadBalances();
  } catch(e) { showToast('Claim failed: '+e.message.slice(0,80), true); }
}

// =======================================================================
//                         HISTORY
// =======================================================================
function loadHistory() {
  const container = $('historyList');
  const stored = JSON.parse(localStorage.getItem('efc_tx_history') || '[]');
  if (stored.length === 0) {
    container.innerHTML = '<p class="text-gray-400">No transactions.</p>';
    return;
  }
  let html = '';
  stored.slice(0,10).forEach(tx => {
    html += `<div class="history-item">
      <span><strong>${tx.symbol}</strong> ${parseFloat(tx.amount).toFixed(4)}</span>
      <span class="text-sm text-gray-400">${tx.time}</span>
      <a href="https://bscscan.com/tx/${tx.hash}" target="_blank" class="text-blue-400"><i class="fas fa-external-link-alt"></i></a>
    </div>`;
  });
  container.innerHTML = html;
}

// =======================================================================
//                         UNLOCK / CONNECT
// =======================================================================
function unlockAndConnect(password) {
  const result = unlockWallet(password);
  if (!result) { showToast('Wrong password', true); return false; }
  walletData = result;
  isUnlocked = true;
  $('welcomeScreen').style.display = 'none';
  $('dashboard').style.display = 'block';
  $('lockBtn').style.display = 'inline-block';
  loadBalances();
  if (window._balanceInterval) clearInterval(window._balanceInterval);
  window._balanceInterval = setInterval(() => { if (isUnlocked) loadBalances(); }, 15000);
  return true;
}

function lockWallet() {
  isUnlocked = false;
  walletData = null;
  if (window._balanceInterval) clearInterval(window._balanceInterval);
  $('welcomeScreen').style.display = 'flex';
  $('dashboard').style.display = 'none';
  $('lockBtn').style.display = 'none';
  showToast('Wallet locked');
}

// =======================================================================
//                         EVENT BINDINGS
// =======================================================================
$('welcomeCreate').onclick = () => {
  openModal(`
    <h3>Create New Wallet</h3>
    <p>Set a password to encrypt your seed phrase.</p>
    <input type="password" id="newPw1" class="input-field mt-2" placeholder="Password">
    <input type="password" id="newPw2" class="input-field mt-2" placeholder="Confirm password">
    <button id="createConfirm" class="btn-gold mt-2">Generate</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button>
  `);
  $('createConfirm').onclick = () => {
    const pw1 = $('newPw1').value;
    const pw2 = $('newPw2').value;
    if (!pw1 || pw1.length<4) { showToast('Password min 4 chars', true); return; }
    if (pw1 !== pw2) { showToast('Passwords do not match', true); return; }
    const result = createNewWallet(pw1);
    showToast('Wallet created! Unlock with your password.');
    closeModal();
    unlockAndConnect(pw1);
  };
};

$('welcomeImport').onclick = () => {
  openModal(`
    <h3>Import Wallet</h3>
    <p>Enter your 12‑word recovery phrase.</p>
    <textarea id="importMnemonic" class="input-field mt-2" rows="3" placeholder="word1 word2 ... word12"></textarea>
    <input type="password" id="importPassword" class="input-field mt-2" placeholder="Set a password to encrypt">
    <button id="importConfirm" class="btn-primary mt-2">Import</button>
    <button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button>
  `);
  $('importConfirm').onclick = () => {
    const mnemonic = $('importMnemonic').value.trim();
    const pw = $('importPassword').value;
    if (!mnemonic || mnemonic.split(' ').length < 12) { showToast('Invalid mnemonic', true); return; }
    if (!pw || pw.length<4) { showToast('Password required', true); return; }
    try {
      const wallet = ethers.Wallet.fromMnemonic(mnemonic);
      const encrypted = encryptMnemonic(mnemonic, pw);
      localStorage.setItem('efc_wallet_encrypted', encrypted);
      localStorage.setItem('efc_wallet_address', wallet.address);
      showToast('Wallet imported!');
      closeModal();
      unlockAndConnect(pw);
    } catch(e) { showToast('Import failed: '+e.message, true); }
  };
};

$('lockBtn').onclick = lockWallet;
$('refreshBtn').onclick = () => { if(isUnlocked) { loadBalances(); showToast('Refreshed'); } };
$('sendBtn').onclick = () => { if(walletData) sendCoin(EFC_ADDRESS, 'EFC'); };
$('receiveBtn').onclick = () => { if(walletData) receiveCoin(); };

// =======================================================================
//                         INIT
// =======================================================================
if (localStorage.getItem('efc_wallet_encrypted')) {
  $('welcomeScreen').style.display = 'flex';
  $('dashboard').style.display = 'none';
  $('lockBtn').style.display = 'none';
} else {
  $('welcomeScreen').style.display = 'flex';
  $('dashboard').style.display = 'none';
  $('lockBtn').style.display = 'none';
}
